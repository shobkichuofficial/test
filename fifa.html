<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA Ultra Stream | By Sabbir Rahoman</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8A1538">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #8A1538; 
            --primary-glow: #e8205b;
            --gold: #D4AF37;
            --gold-glow: #ffdf73;
            --bg-dark: #07080a;
            --bg-panel: rgba(20, 22, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f0f0f0;
            --text-muted: #8e93a1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(138, 21, 56, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(212, 175, 55, 0.1), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        /* Navbar */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(7, 8, 10, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .logo {
            font-family: 'Rajdhani', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo i { color: var(--primary); }

        .nav-tools {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .btn-donate {
            background: linear-gradient(45deg, var(--primary), #b31b49);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(138, 21, 56, 0.4);
            transition: 0.3s;
        }
        .btn-donate:hover { box-shadow: 0 0 25px rgba(232, 32, 91, 0.6); transform: translateY(-2px); }

        /* Main Grid Layout */
        .dashboard {
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 25px;
            padding: 30px 40px;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
        }

        /* Left Side: Video & Stats */
        .main-stream {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .video-container {
            position: relative;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            box-shadow: 0 15px 40px rgba(0,0,0,0.8), 0 0 20px rgba(212, 175, 55, 0.1);
        }

        video {
            width: 100%;
            aspect-ratio: 16/9;
            display: block;
            object-fit: cover;
        }

        .stream-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        .badge {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .badge.live { color: #ff3b30; }
        .badge.live i { animation: blink 1.5s infinite; }
        .badge.quality { color: var(--gold); }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Server Buttons */
        .server-options {
            display: flex;
            gap: 15px;
        }
        .btn-server {
            background: var(--bg-panel);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-server.active {
            background: var(--primary);
            border-color: var(--primary-glow);
        }
        .btn-server:hover {
            background: rgba(138, 21, 56, 0.5);
        }

        /* Match Info Bar */
        .match-info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-panel);
            padding: 20px 25px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }
        .team-score {
            display: flex;
            align-items: center;
            gap: 20px;
            font-family: 'Rajdhani', sans-serif;
        }
        .team { font-size: 24px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .team img { width: 40px; height: 40px; }
        .score { font-size: 36px; font-weight: 800; color: var(--gold); background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 10px; }
        
        .match-details h3 { font-size: 18px; color: var(--text-main); }
        .match-details p { font-size: 13px; color: var(--text-muted); margin-top: 5px; }

        /* Right Side: Chat & Panels */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 100%;
        }

        .panel {
            background: var(--bg-panel);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--glass-border);
            font-weight: 600;
            color: var(--gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Live Chat */
        .chat-box {
            flex: 1;
            height: 400px;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .chat-msg {
            font-size: 13px;
            line-height: 1.4;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
        
        .chat-msg span.user { font-weight: 600; color: #4facfe; margin-right: 5px; }
        .chat-msg span.badge-vip { background: var(--gold); color: black; padding: 2px 5px; border-radius: 4px; font-size: 10px; margin-right: 5px; font-weight: bold; }
        
        .chat-input {
            display: flex;
            padding: 15px;
            border-top: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.3);
        }
        .chat-input input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-family: 'Outfit', sans-serif;
            padding: 0 10px;
        }
        .chat-input button {
            background: var(--primary);
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
        }
        .chat-input button:hover { background: var(--primary-glow); }

        /* Upcoming / Extra Info */
        .fixture-list { padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .fixture-item {
            display: flex;
            justify-content: space-between;
            background: rgba(255,255,255,0.03);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
            transition: 0.2s;
        }
        .fixture-item:hover { background: rgba(255,255,255,0.08); border-left: 3px solid var(--gold); }

        /* Footer Credits */
        footer {
            margin-top: auto;
            text-align: center;
            padding: 30px 20px;
            border-top: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.4);
        }
        .creator-badge {
            display: inline-block;
            background: linear-gradient(90deg, rgba(138,21,56,0.2) 0%, rgba(212,175,55,0.2) 100%);
            padding: 10px 25px;
            border-radius: 30px;
            border: 1px solid rgba(212,175,55,0.3);
        }
        .creator-badge h4 {
            font-weight: 400;
            color: var(--text-muted);
            font-size: 14px;
        }
        .creator-badge span {
            font-weight: 800;
            color: var(--gold);
            font-family: 'Rajdhani', sans-serif;
            font-size: 18px;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(212,175,55,0.5);
        }
        .creator-badge p { font-size: 12px; margin-top: 4px; color: #aaa; }

        @media (max-width: 1024px) {
            .dashboard { grid-template-columns: 1fr; }
            .sidebar { height: auto; }
            .match-info-bar { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><i class="fa-solid fa-trophy"></i> FIFA<span>Stream</span></div>
        <div class="nav-tools">
            <div style="font-size: 14px; color: var(--text-muted);"><i class="fa-solid fa-users"></i> 1.8M Watching</div>
            <button class="btn-donate"><i class="fa-solid fa-bolt"></i> Premium</button>
        </div>
    </header>

    <div class="dashboard">
        <div class="main-stream">
            <div class="video-container">
                <div class="stream-overlay">
                    <div class="badge live"><i class="fa-solid fa-circle"></i> LIVE</div>
                    <div class="badge quality">4K <i class="fa-solid fa-tv"></i></div>
                </div>
                <video id="video-player" controls autoplay playsinline></video>
            </div>
            
            <div class="server-options">
                <button class="btn-server active" id="srv1" onclick="changeServer('https://live.kooran13.cfd/yalls2/index.m3u8', 'srv1')"><i class="fa-solid fa-server"></i> Server 1</button>
                <button class="btn-server" id="srv2" onclick="changeServer('https://cors-proxy.cooks.fyi/http://147.135.114.221:8001/play/a00m/index.m3u8', 'srv2')"><i class="fa-solid fa-server"></i> Server 2 (New)</button>
            </div>

            <div class="match-info-bar">
                <div class="team-score">
                    <div class="team">ARG <i class="fa-solid fa-shield"></i></div>
                    <div class="score">2 - 1</div>
                    <div class="team"><i class="fa-solid fa-shield-halved"></i> FRA</div>
                </div>
                <div class="match-details">
                    <h3>World Cup Final - Lusail Stadium</h3>
                    <p><i class="fa-regular fa-clock"></i> 78' Min | Possession: 54% - 46%</p>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="panel" style="flex: 1;">
                <div class="panel-header">
                    <span><i class="fa-solid fa-comments"></i> Live World Chat</span>
                    <i class="fa-solid fa-ellipsis-vertical" style="cursor: pointer;"></i>
                </div>
                <div class="chat-box" id="chat-box">
                    </div>
                <div class="chat-input">
                    <input type="text" placeholder="Send a message...">
                    <button><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <span><i class="fa-solid fa-calendar-days"></i> Next Matches</span>
                </div>
                <div class="fixture-list">
                    <div class="fixture-item">
                        <span>BRA vs POR</span>
                        <span style="color: var(--gold);">Tomorrow, 8 PM</span>
                    </div>
                    <div class="fixture-item">
                        <span>ENG vs ESP</span>
                        <span style="color: var(--gold);">22 Nov, 1 AM</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="creator-badge">
            <h4>Recreated & Engineered by</h4>
            <span>SABBIR RAHOMAN</span>
            <p>Digital Creator | Front-End & UI/UX Designer</p>
        </div>
    </footer>

    <script>
        // HLS Streaming Logic with Server Switching
        const video = document.getElementById('video-player');
        let hls;

        function initPlayer(src) {
            if (Hls.isSupported()) {
                if (hls) {
                    hls.destroy();
                }
                hls = new Hls({ maxBufferLength: 30, maxMaxBufferLength: 60 });
                hls.loadSource(src);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play().catch(e => console.log("Autoplay blocked"));
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = src;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }
        }

        // Initialize default server
        initPlayer('https://live.kooran13.cfd/yalls2/index.m3u8');

        // Function to change server on button click
        function changeServer(url, btnId) {
            document.querySelectorAll('.btn-server').forEach(btn => btn.classList.remove('active'));
            document.getElementById(btnId).classList.add('active');
            initPlayer(url);
        }

        // Live Chat Simulation (Creates the "Sticky" Vibe)
        const chatBox = document.getElementById('chat-box');
        const usernames = ['MessiFan99', 'SoccerPro', 'JohnDoe', 'FIFA_King', 'Alex_10'];
        const messages = ['What a pass!! 🔥', 'GOALLLLLL ⚽⚽', 'Ref needs glasses 😡', 'This match is intense!', 'Vamos!! 🇦🇷'];
        
        function addChatMessage() {
            const isVip = Math.random() > 0.8;
            const user = usernames[Math.floor(Math.random() * usernames.length)];
            const msg = messages[Math.floor(Math.random() * messages.length)];
            
            const div = document.createElement('div');
            div.className = 'chat-msg';
            div.innerHTML = `${isVip ? '<span class="badge-vip">VIP</span>' : ''}<span class="user">${user}:</span> ${msg}`;
            
            chatBox.appendChild(div);
            
            // Auto scroll to bottom
            if (chatBox.childElementCount > 50) chatBox.removeChild(chatBox.firstChild);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Add a new message every 1.5 to 3 seconds
        setInterval(addChatMessage, Math.floor(Math.random() * 2000) + 1500);
    </script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('Service Worker registered successfully');
                    })
                    .catch(error => {
                        console.log('Service Worker registration failed:', error);
                    });
            });
        }
    </script>
</body>
</html>
